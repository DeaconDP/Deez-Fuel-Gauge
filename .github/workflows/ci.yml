name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore CursorUsageWidget.sln

      - name: Build
        run: dotnet build CursorUsageWidget.sln -c Release --no-restore

      - name: Test
        run: dotnet test CursorUsageWidget.sln -c Release --no-build

      - name: Verify macOS packaging
        if: runner.os == 'macOS'
        run: |
          chmod +x scripts/package-macos-app.sh scripts/package-macos-release.sh scripts/refresh-macos-setup-launcher.sh setup-and-run.app/Contents/MacOS/setup-and-run
          ./scripts/refresh-macos-setup-launcher.sh
          test -x setup-and-run.app/Contents/MacOS/setup-and-run
          ./scripts/package-macos-app.sh
          test -x CursorUsageWidget.app/Contents/MacOS/CursorUsageWidget
          test -f CursorUsageWidget.app/Contents/MacOS/libSkiaSharp.dylib
          test -f CursorUsageWidget.app/Contents/MacOS/libHarfBuzzSharp.dylib
          test -f CursorUsageWidget.app/Contents/MacOS/libAvaloniaNative.dylib
          test -f CursorUsageWidget.app/Contents/Resources/AppIcon.icns
          codesign --verify --deep --strict CursorUsageWidget.app
          codesign --verify --deep --strict setup-and-run.app
          ./scripts/package-macos-release.sh
          test -f Releases/cursor-usage-widget-mac-Universal.zip
          unzip -l Releases/cursor-usage-widget-mac-Universal.zip | grep -q AppIcon.icns
