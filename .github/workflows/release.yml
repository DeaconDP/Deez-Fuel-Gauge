name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build release
        shell: pwsh
        run: ./scripts/build-release.ps1

      - name: Upload build artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            Releases/cursor-usage-widget-win-Setup.exe
            Releases/cursor-usage-widget-*-full.nupkg
            Releases/cursor-usage-widget-win-Portable.zip
            Releases/*.json
            Releases/RELEASES

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Releases/cursor-usage-widget-win-Setup.exe
            Releases/cursor-usage-widget-*-full.nupkg
            Releases/cursor-usage-widget-win-Portable.zip
            Releases/assets.win.json
            Releases/releases.win.json
            Releases/RELEASES
          generate_release_notes: true
