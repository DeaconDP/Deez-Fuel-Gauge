name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos-release:
    name: macOS release artifact
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore DeezFuelGauge.sln

      - name: Build
        run: dotnet build DeezFuelGauge.sln -c Release --no-restore

      - name: Test
        run: dotnet test DeezFuelGauge.sln -c Release --no-build

      - name: Package macOS release
        run: |
          chmod +x scripts/package-macos-release.sh
          ./scripts/package-macos-release.sh

      - name: Notarize macOS release
        if: env.APPLE_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          ditto -x -k Releases/deez-fuel-gauge-mac-Universal.zip /tmp/cuw-release
          codesign --force --deep --sign - "/tmp/cuw-release/Deez Fuel Gauge.app"
          xcrun notarytool submit Releases/deez-fuel-gauge-mac-Universal.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait || echo "Notarization skipped or failed — upload manually if needed"

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Releases/deez-fuel-gauge-mac-Universal.zip

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: deez-fuel-gauge-mac-Universal
          path: Releases/deez-fuel-gauge-mac-Universal.zip
